<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pensioner Login – PensionGov</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="login-body pensioner-login-body">
  <div class="login-bg"><div class="login-orb orb-p-1"></div><div class="login-orb orb-p-2"></div><div class="login-orb login-orb-3"></div></div>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-emblem"><div class="emblem-ring emblem-green"><i class="bi bi-person-check-fill"></i></div></div>
      <div class="login-header">
        <h1 class="login-title">Pensioner Portal</h1>
        <p class="login-subtitle">Government of Tamil Nadu<br>Access your pension account</p>
      </div>
      {% if error %}<div class="login-error"><i class="bi bi-exclamation-triangle-fill"></i> {{ error }}</div>{% endif %}
      <form method="POST" class="login-form">
        <div class="login-field">
          <label>Email Address or Pension ID</label>
          <div class="field-input-wrap">
            <i class="bi bi-person-fill field-icon"></i>
            <input type="text" name="identifier" placeholder="e.g. name@email.com or PNS-{{ now_year }}-001" required/>
          </div>
        </div>
        <div class="login-field">
          <label>Password</label>
          <div class="field-input-wrap">
            <i class="bi bi-lock-fill field-icon"></i>
            <input type="password" name="password" id="pw" placeholder="Enter your password" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('pw','pw-eye')"><i class="bi bi-eye" id="pw-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="login-btn login-btn-green"><i class="bi bi-box-arrow-in-right"></i> Login to My Pension</button>
      </form>
      <div class="login-switch-link">
        <a href="{{ url_for('pensioner_register') }}"><i class="bi bi-person-plus"></i> New Registration</a>
        &nbsp;·&nbsp;
        <a href="{{ url_for('admin_login') }}"><i class="bi bi-shield-check"></i> Admin Login</a>
        &nbsp;·&nbsp;
        <a href="{{ url_for('index') }}"><i class="bi bi-house"></i> Home</a>
      </div>
    </div>
  </div>
  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>fun
